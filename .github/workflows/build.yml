name: Build Desktop Apps

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build package (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat packageDistributionForCurrentOS

      - name: Build package (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./gradlew packageDistributionForCurrentOS

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: client/build/compose/binaries/main/msi/*.msi

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: client/build/compose/binaries/main/deb/*.deb

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: client/build/compose/binaries/main/dmg/*.dmg